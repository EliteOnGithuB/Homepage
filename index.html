<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="e1te.info" />

    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Syne', sans-serif;
        background: #050505;
        color: #f0f0f0;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Subtle grain overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        opacity: 0.025;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* Single ambient line */
      .line-accent {
        position: fixed;
        top: 0;
        left: 50%;
        width: 1px;
        height: 100vh;
        background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.03) 30%, rgba(255,255,255,0.03) 70%, transparent);
        z-index: 0;
        pointer-events: none;
      }

      .page {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem 1.5rem;
      }

      .card {
        max-width: 440px;
        width: 100%;
      }

      /* Header */
      .intro {
        margin-bottom: 3rem;
        opacity: 0;
        animation: enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      }

      .label {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        color: #555;
        margin-bottom: 1rem;
      }

      .name {
        font-size: clamp(2.8rem, 8vw, 3.8rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 0.95;
        color: #fff;
      }

      .tagline {
        margin-top: 1rem;
        font-size: 0.9rem;
        font-weight: 400;
        color: #666;
        line-height: 1.6;
        max-width: 320px;
      }

      /* Links */
      .links {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 3rem;
        opacity: 0;
        animation: enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
      }

      .link {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.7rem 1.3rem;
        text-decoration: none;
        color: #888;
        font-size: 0.85rem;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        transition: all 0.3s ease;
        background: transparent;
      }

      .link:hover {
        color: #fff;
        border-color: rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.03);
      }

      /* Footer */
      .foot {
        position: fixed;
        bottom: 2rem;
        left: 2rem;
        opacity: 0;
        animation: enter 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      }

      .foot a {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        color: #444;
        text-decoration: none;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition: color 0.3s ease;
      }

      .foot a:hover {
        color: #888;
      }

      @keyframes enter {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .page { padding: 1.5rem 1.25rem; }
        .foot { bottom: 1.25rem; left: 1.25rem; }
      }

      .cursor-glow {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 1;
        background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
        will-change: transform;
      }
    </style>
  </head>

  <body>
    <div class="line-accent"></div>
    <div class="cursor-glow" id="glow"></div>

    <div class="page">
      <div class="card">

        <div class="intro">
          <p class="label">e1te.info</p>
          <h1 class="name">Ramiro</h1>
          <p class="tagline">"We suffer more in our imagination than in reality."</p>
        </div>

        <nav class="links">
          <a href="https://x.com/EliteUk_" target="_blank" rel="noopener noreferrer" class="link">Twitter</a>
          <a href="https://www.tiktok.com/@e1teuk" target="_blank" rel="noopener noreferrer" class="link">TikTok</a>
          <a href="https://open.spotify.com/playlist/0wd3FBxmmGAhBpGV4RfdQO?si=cbaad47096e44e66" target="_blank" rel="noopener noreferrer" class="link">Spotify</a>
        </nav>

      </div>
    </div>

    <footer class="foot">
      <a href="https://discord.com/users/820246612264747038" target="_blank" rel="noopener noreferrer">Get in touch →</a>
    </footer>

    <script>
      const glow = document.getElementById('glow');
      let mx = 0, my = 0, cx = 0, cy = 0;

      document.addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
      });

      (function animate() {
        cx += (mx - cx) * 0.12;
        cy += (my - cy) * 0.12;
        glow.style.transform = `translate(${cx - 200}px, ${cy - 200}px)`;
        requestAnimationFrame(animate);
      })();
    </script>
  </body>
</html>
